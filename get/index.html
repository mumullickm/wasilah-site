<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 32px;
    text-align: center;
    background:
      radial-gradient(ellipse 60% 30% at 50% 0%, rgba(241, 213, 146, 0.14), transparent 70%),
      linear-gradient(180deg, #004B49, #002e2c);
    color: #eef1ea;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  .wrap { max-width: 420px; }
  .brand {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #f1d592;
    margin-bottom: 32px;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: #ffffff;
    margin: 0 0 16px;
    line-height: 1.3;
  }
  p {
    color: rgba(241, 213, 146, 0.7);
    margin: 0 0 28px;
    line-height: 1.6;
    font-size: 0.95rem;
  }
  .stores { display: flex; flex-wrap: wrap; gap: 14px 16px; align-items: center; justify-content: center; }
  .store-button { display: inline-block; transition: transform 0.2s; }
  .store-button:hover { transform: translateY(-2px); }
  .store-button img { height: 58px; width: auto; display: block; }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(241, 213, 146, 0.2);
    border-top-color: #f1d592;
    border-radius: 50%;
    margin: 0 auto 24px;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

<body>
<main class="wrap">
  <p class="brand">Wasilah</p>
  <div class="spinner" id="spinner" aria-hidden="true"></div>
  <h1 id="heading">Get Wasilah</h1>
  <p id="subhead">Free, no ads, no tracking. Choose your store below.</p>
  <div class="stores">
    <a class="store-button" id="ios-link" href="https://apps.apple.com/app/id6767919573" aria-label="Download Wasilah on the App Store">
      <img src="/App_Store.svg?v=20260606b" alt="Download on the App Store" width="200" height="60">
    </a>
    <a class="store-button" id="android-link" href="https://play.google.com/store/apps/details?id=site.wasilah.wasilah" aria-label="Get Wasilah on Google Play">
      <img src="/Google_Play.svg?v=20260606b" alt="Get it on Google Play" width="200" height="60">
    </a>
  </div>
</main>
<script>
  (function () {
    var APP_STORE = "https://apps.apple.com/app/id6767919573";
    var PLAY = "https://play.google.com/store/apps/details?id=site.wasilah.wasilah";
    var ua = navigator.userAgent || "";

    // Only treat genuine phones/tablets as a single-store target. A Mac, PC or
    // any desktop browser sees both stores and chooses - never a silent redirect.
    var isiOS = /iPhone|iPad|iPod/i.test(ua) ||
      (/Macintosh/i.test(ua) && navigator.maxTouchPoints > 1); // iPadOS reports as Mac
    var isAndroid = /Android/i.test(ua);

    var iosLink = document.getElementById("ios-link");
    var androidLink = document.getElementById("android-link");
    var heading = document.getElementById("heading");
    var subhead = document.getElementById("subhead");
    var spinner = document.getElementById("spinner");
    var stores = iosLink.parentNode;

    if (isiOS && !isAndroid) {
      heading.textContent = "Opening the App Store…";
      subhead.textContent = "Not redirected? Tap below.";
      setTimeout(function () { window.location.replace(APP_STORE); }, 50);
    } else if (isAndroid) {
      heading.textContent = "Opening Google Play…";
      subhead.textContent = "Not redirected? Tap below.";
      stores.insertBefore(androidLink, iosLink); // surface Play first for Android
      setTimeout(function () { window.location.replace(PLAY); }, 50);
    } else {
      // Desktop: no auto-redirect. Show both badges and let the visitor pick.
      spinner.style.display = "none";
    }
  })();
</script>
</body>
