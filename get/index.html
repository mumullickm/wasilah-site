<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Get Wasilah on Google Play</title>
<meta name="description" content="Download Wasilah from Google Play. Prayer times, Quran, Hadith, Qibla and Zakat in Bangla. Free. No ads. Made for Bangladesh.">
<meta name="robots" content="noindex, follow">
<meta name="theme-color" content="#004B49">

<meta http-equiv="refresh" content="0; url=https://play.google.com/store/apps/details?id=site.wasilah.wasilah">
<link rel="canonical" href="https://play.google.com/store/apps/details?id=site.wasilah.wasilah">

<meta property="og:title" content="Wasilah - Islamic app for Bangladesh">
<meta property="og:description" content="Prayer times, Quran, Hadith, Qibla and Zakat in Bangla. Free. No ads.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://wasilah.site/">
<meta property="og:image" content="https://wasilah.site/Slider.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Wasilah - Islamic app for Bangladesh">
<meta name="twitter:description" content="Prayer times, Quran, Hadith, Qibla and Zakat in Bangla. Free. No ads.">
<meta name="twitter:image" content="https://wasilah.site/Slider.png">

<link rel="icon" href="/wasilah_icon_wobg.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/wasilah_icon.png">

<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 32px;
    text-align: center;
    background:
      radial-gradient(ellipse 60% 30% at 50% 0%, rgba(241, 213, 146, 0.14), transparent 70%),
      linear-gradient(180deg, #004B49, #002e2c);
    color: #eef1ea;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  .wrap { max-width: 420px; }
  .brand {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #f1d592;
    margin-bottom: 32px;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: #ffffff;
    margin: 0 0 16px;
    line-height: 1.3;
  }
  p {
    color: rgba(241, 213, 146, 0.7);
    margin: 0 0 28px;
    line-height: 1.6;
    font-size: 0.95rem;
  }
  a.cta {
    display: inline-block;
    padding: 14px 26px;
    background: #f1d592;
    color: #003836;
    font-weight: 700;
    border-radius: 999px;
    text-decoration: none;
    transition: background 0.2s, transform 0.2s;
  }
  a.cta:hover { background: #f9e9bf; transform: translateY(-1px); }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(241, 213, 146, 0.2);
    border-top-color: #f1d592;
    border-radius: 50%;
    margin: 0 auto 24px;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<main class="wrap">
  <p class="brand">Wasilah</p>
  <div class="spinner" aria-hidden="true"></div>
  <h1>Opening Google Play&hellip;</h1>
  <p>If you are not redirected automatically, tap the button below to open Wasilah on Google Play.</p>
  <a class="cta" href="https://play.google.com/store/apps/details?id=site.wasilah.wasilah">Get it on Google Play</a>
</main>
<script>
  // Backup redirect in case meta refresh is blocked
  setTimeout(function () {
    window.location.replace("https://play.google.com/store/apps/details?id=site.wasilah.wasilah");
  }, 50);
</script>
</body>
</html>
